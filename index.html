<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hogarth — A Wizarding Minecraft Realm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Cormorant+SC:wght@300;400;500&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
html,body{overflow:hidden;background:#0d0b08;}
#intro{
  position:fixed;inset:0;z-index:500;background:#0d0b08;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  transition:opacity 1.4s ease,visibility 1.4s ease;
}
#intro.fade-out{opacity:0;visibility:hidden;pointer-events:none;}
#intro::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(180,130,40,.04) 0%,transparent 70%);
  pointer-events:none;
}
.intro-quote-wrap{position:relative;max-width:520px;padding:0 2.5rem;text-align:center;}
#quote-text{
  font-family:'IM Fell English',serif;font-size:clamp(1.1rem,2.2vw,1.45rem);
  font-style:italic;color:rgba(245,237,224,1);line-height:1.95;letter-spacing:.01em;
}
.q-word{display:inline-block;opacity:0;transform:translateY(6px);transition:opacity .55s ease,transform .55s ease;margin-right:.27em;color:rgba(245,237,224,1);}
.q-word.visible{opacity:1;transform:translateY(0);}
.q-word.fade-word{opacity:0;transform:translateY(-5px);transition:opacity .45s ease,transform .45s ease;}
#quote-attr{margin-top:1.6rem;font-family:'Cormorant SC',serif;font-size:.52rem;letter-spacing:.5em;text-transform:uppercase;color:rgba(160,140,112,0);transition:color 1.2s ease,opacity 1.2s ease;}
#quote-attr.show{color:rgba(160,140,112,.55);}
#quote-attr.fade-attr{opacity:0;transition:opacity .7s ease;}
.intro-rule{display:flex;align-items:center;justify-content:center;gap:1rem;margin-top:2.2rem;opacity:0;transition:opacity 1s ease;}
.intro-rule.show{opacity:1;}
.intro-rule-line{width:44px;height:1px;background:linear-gradient(90deg,transparent,rgba(160,140,112,.25));}
.intro-rule-line.r{background:linear-gradient(90deg,rgba(160,140,112,.25),transparent);}
.intro-rule-dot{width:2px;height:2px;border-radius:50%;background:rgba(160,140,112,.3);}
#skip-hint{position:absolute;bottom:2.4rem;left:50%;transform:translateX(-50%);font-family:'Cormorant SC',serif;font-size:.5rem;letter-spacing:.42em;text-transform:uppercase;color:rgba(160,140,112,.3);opacity:0;transition:opacity .6s ease;cursor:pointer;white-space:nowrap;}
#skip-hint.show{opacity:1;}
#skip-hint:hover{color:rgba(160,140,112,.6);}

#site{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 1.3s ease .1s;background:var(--paper);}
#site.show{opacity:1;pointer-events:all;overflow-y:auto;}
#nav-mount{flex-shrink:0;}

canvas#footCanvas{position:fixed;inset:0;pointer-events:none;z-index:1;}

/* HOME CONTENT */
.home-wrap{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:3rem clamp(1.5rem,6vw,5rem);text-align:center;
}
.home-eye{font-family:'Cormorant SC',serif;font-size:.58rem;letter-spacing:.55em;text-transform:uppercase;color:var(--ink5);margin-bottom:1.5rem;}
.home-title{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(3.4rem,9.5vw,7rem);line-height:.9;color:var(--ink);letter-spacing:-.01em;margin-bottom:.15em;text-align:center;}
.home-title em{font-style:italic;display:block;color:var(--ink2);}
.home-desc{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:clamp(.95rem,1.8vw,1.15rem);color:var(--ink3);max-width:380px;margin:0 auto 2.4rem;line-height:1.95;text-align:center;}
.btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;}
.stats{display:flex;gap:3rem;justify-content:center;margin-top:3.2rem;flex-wrap:wrap;}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;font-style:italic;color:var(--ink2);line-height:1;margin-bottom:.2rem;}
.stat-lbl{font-family:'Cormorant SC',serif;font-size:.53rem;letter-spacing:.4em;text-transform:uppercase;color:var(--ink5);}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div class="intro-quote-wrap">
    <div id="quote-text"></div>
    <div class="intro-rule" id="intro-rule">
      <div class="intro-rule-line"></div><div class="intro-rule-dot"></div><div class="intro-rule-line r"></div>
    </div>
    <div id="quote-attr">— The Hogarth Charter</div>
  </div>
  <div id="skip-hint" onclick="skipIntro()">skip</div>
</div>

<canvas id="footCanvas"></canvas>

<div id="site">
  <div id="nav-mount"></div>

  <div class="home-wrap">
    <div class="home-eye">A Wizarding Minecraft Realm · Java 1.20+</div>
    <h1 class="home-title">Welcome to<br><em>Hogarth</em></h1>
    <div class="rule"><div class="rule-line"></div><div class="rule-dot"></div><div class="rule-line r"></div></div>
    <p class="home-desc">Wander the corridors. Master your craft.<br>Find your house. Leave your mark.</p>
    <div class="btns">
      <a class="btn-s" href="howtoplay.html">Begin Your Journey</a>
      <button class="btn-g" onclick="copyIP()">Copy Server IP</button>
    </div>
    <div class="stats">
      <div><div class="stat-num">12k+</div><div class="stat-lbl">Wizards</div></div>
      <div><div class="stat-num">4</div><div class="stat-lbl">Houses</div></div>
      <div><div class="stat-num">24/7</div><div class="stat-lbl">Online</div></div>
      <div><div class="stat-num">1.20</div><div class="stat-lbl">Java</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"><strong id="tt"></strong><p id="tm"></p></div>

<script src="shared.js"></script>
<script src="nav-loader.js"></script>
<script>
/* INTRO */
const QUOTE = "Magic does not choose the worthy — it reveals them. What you carry through these doors is already yours. The castle only holds up the mirror.";
let introSkipped=false, introTimers=[];
function ti(fn,ms){const id=setTimeout(fn,ms);introTimers.push(id);return id;}
function skipIntro(){if(introSkipped)return;introSkipped=true;introTimers.forEach(clearTimeout);revealSite();}
function revealSite(){
  document.getElementById('intro').classList.add('fade-out');
  document.body.style.background='var(--paper)';
  ti(()=>{document.getElementById('site').classList.add('show');ti(startFeet,400);},700);
}
function runIntro(){
  const container=document.getElementById('quote-text');
  const words=QUOTE.split(' ');const spans=[];
  words.forEach((w,i)=>{const sp=document.createElement('span');sp.className='q-word';sp.textContent=w;container.appendChild(sp);spans.push(sp);if(i<words.length-1)container.appendChild(document.createTextNode(' '));});
  const WI=90,total=words.length*WI+400;
  spans.forEach((sp,i)=>{ti(()=>{if(!introSkipped)sp.classList.add('visible');},500+i*WI);});
  ti(()=>{if(!introSkipped)document.getElementById('skip-hint').classList.add('show');},900);
  ti(()=>{if(!introSkipped){document.getElementById('intro-rule').classList.add('show');document.getElementById('quote-attr').classList.add('show');}},total+600);
  const vs=total+600+2200;
  ti(()=>{
    if(introSkipped)return;
    spans.forEach((sp,i)=>{ti(()=>sp.classList.add('fade-word'),i*35);});
    document.getElementById('quote-attr').classList.add('fade-attr');
    document.getElementById('intro-rule').style.cssText='opacity:0;transition:opacity .6s ease';
    document.getElementById('skip-hint').style.cssText='opacity:0;transition:opacity .4s ease';
  },vs);
  ti(()=>{if(!introSkipped)revealSite();},vs+spans.length*35+900+300);
}
window.addEventListener('DOMContentLoaded',()=>ti(runIntro,350));

/* FOOTPRINTS */
const cv=document.getElementById('footCanvas'),cx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
window.addEventListener('resize',resize);resize();
class Walker{
  constructor(){
    const e=Math.floor(Math.random()*4);
    if(e===0){this.x=Math.random()*W;this.y=-30;}else if(e===1){this.x=W+30;this.y=Math.random()*H;}else if(e===2){this.x=Math.random()*W;this.y=H+30;}else{this.x=-30;this.y=Math.random()*H;}
    this.ang=Math.atan2(H/2-this.y,W/2-this.x)+(Math.random()-.5)*1.4;
    this.spd=.9+Math.random()*.7;this.sd=0;this.sg=24+Math.random()*10;
    this.foot=1;this.prints=[];this.age=0;this.maxAge=200+Math.random()*140;
    this.sz=7+Math.random()*4.5;this.wt=0;this.gone=false;
  }
  update(){
    if(this.gone)return;
    this.wt+=.018;this.ang+=Math.sin(this.wt)*.016;
    this.x+=Math.cos(this.ang)*this.spd;this.y+=Math.sin(this.ang)*this.spd;
    this.sd+=this.spd;this.age++;
    if(this.sd>=this.sg){this.sd=0;this.foot*=-1;const off=this.foot*this.sz*.5;this.prints.push({x:this.x+Math.cos(this.ang+Math.PI/2)*off,y:this.y+Math.sin(this.ang+Math.PI/2)*off,a:this.ang,al:1,sz:this.sz});}
    for(let i=this.prints.length-1;i>=0;i--){this.prints[i].al-=.0038;if(this.prints[i].al<=0)this.prints.splice(i,1);}
    if(this.age>this.maxAge&&this.prints.length===0)this.gone=true;
  }
  draw(){
    for(const p of this.prints){
      cx.save();cx.translate(p.x,p.y);cx.rotate(p.a-Math.PI/2);
      cx.globalAlpha=p.al*.18;cx.fillStyle='#1a130a';
      cx.beginPath();cx.ellipse(0,p.sz*.18,p.sz*.32,p.sz*.5,0,0,Math.PI*2);cx.fill();
      cx.beginPath();cx.ellipse(0,-p.sz*.36,p.sz*.24,p.sz*.17,0,0,Math.PI*2);cx.fill();
      cx.restore();
    }
  }
}
const walkers=[];
function startFeet(){
  for(let i=0;i<3;i++)setTimeout(()=>walkers.push(new Walker()),i*1600);
  requestAnimationFrame(loop);
}
function loop(){
  cx.clearRect(0,0,W,H);
  for(let i=walkers.length-1;i>=0;i--){walkers[i].update();walkers[i].draw();if(walkers[i].gone){walkers.splice(i,1);setTimeout(()=>walkers.push(new Walker()),500+Math.random()*1200);}}
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
